AWSTemplateFormatVersion: "2010-09-09"
Description: Project 1
Parameters:
  KMSKeyAlias:
    Type: String
  IAMArn:
    Type: String
Resources:
  KmsKey:
    Type: "AWS::KMS::Key"
    Properties:
      EnableKeyRotation: True
      PendingWindowInDays: 7
      KeyPolicy:
        Version: 2012-10-17
        Statement:
          - Sid: Administration of the key
            Effect: Allow
            Principal:
              AWS: 'arn:aws:iam::555887476308:root'
            Action:
              - 'kms:Create*'
              - 'kms:Describe*'
              - 'kms:Enable*'
              - 'kms:List*'
              - 'kms:Put*'
              - 'kms:Update*'
              - 'kms:Revoke*'
              - 'kms:Disable*'
              - 'kms:Get*'
              - 'kms:Delete*'
              - 'kms:ScheduleKeyDeletion'
              - 'kms:CancelKeyDeletion'
            Resource: '*'
          - Sid: Allow use of the key for the ebs volume
            Effect: Allow
            Principal:
              AWS: !Ref IAMArn
            Action:
              - 'kms:CreateGrant'
              - 'kms:Decrypt'
              - 'kms:DescribeKey'
              - 'kms:GenerateDataKeyWithoutPlainText'
              - 'kms:ReEncrypt'
            Resource: '*'
  KMSAlias:
    Type: "AWS::KMS::Alias"
    Properties:
      AliasName: !Sub 'alias/${KMSKeyAlias}'
      TargetKeyId: !Ref KmsKey
Outputs:
  EBSKeyArn:
    Value: !GetAtt KmsKey.Arn